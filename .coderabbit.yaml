# CodeRabbit Configuration (.coderabbit.yaml)

# 1. 기본 설정 (언어 및 페르소나)
language: ko-KR

tone_instructions: >
  당신은 '우아한테크코스'의 코치입니다. 목표는 우테코 크루들이 코드 품질을 개선하며 성장하도록 돕는 것입니다.
  1. 피드백은 명확하고 구체적이어야 하며, 문제의 원인과 개선 방법을 반드시 제시하세요.
  2. 리뷰는 교육적이어야 하며, 관련 개념이나 공식 문서를 함께 추천하세요.
  3. 비판보다는 개선 중심의 제안을 우선하세요.
  4. 칭찬은 짧고 위트 있게 작성하세요.

# 2. 코드 리뷰 세부 설정
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  changed_files_summary: false
  sequence_diagrams: false
  assess_linked_issues: true
  related_issues: false
  related_prs: false
  suggested_labels: false
  auto_apply_labels: false
  suggested_reviewers: false
  auto_assign_reviewers: false
  poem: true # 리뷰 요약에 위트 있는 시 포함

  # 경로별 맞춤 리뷰 지침
  path_instructions:
    - path: src/main/java/**
      instructions: |
        1. 팀의 코딩 컨벤션(.claude/rules/code-style.md)을 준수하는지 확인해주세요.
           - 메서드 길이는 15줄 이내, 깊이(depth)는 3 이내로 작성되었는가?
           - 네이밍이 누구나 알 수 있는 쉬운 단어이며, 변수는 camelCase, 패키지명은 소문자인가?
           - 메서드명에 매개변수 타입이 중복되어 사용되지 않았는가?
        2. 엔티티 및 서비스 설계 원칙을 확인해주세요.
           - Entity의 @NoArgsConstructor는 PROTECTED로 제한되었는가?
           - Service 클래스가 비즈니스 로직 5개 이상으로 커질 경우 조회/비조회로 분리되었는가?
           - UserService와 같은 광범위한 네이밍 대신 기능별로 세분화된 네이밍을 사용했는가?
        3. 객체지향, 클린코드, 리팩토링, 공통 예외 처리를 확인해주세요.
        4. 문제점과 대안을 논리적으로 제시하고 필요한 경우 예시 코드를 추가해 주세요.
        5. 미작성한 테스트 코드 케이스가 있다면 제안해주세요.
        6. 리뷰는 해당 라인 범위의 코멘트에 작성해주세요.

  # 3. 자동화 설정 (수동 실행 위주)
  auto_review:
    enabled: false # PR 생성 시 자동 리뷰 끔 (@coderabbitai review 입력 시 시작)
    auto_incremental_review: false # 추가 커밋 시 자동 리뷰 끔

# 4. 채팅 및 지식 기반 설정
chat:
  auto_reply: true # 언급하지 않아도 답글 자동 작성

knowledge_base:
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
    filePatterns:
      - .claude/rules/code-style.md
      - .claude/rules/project-structure.md
  learnings:
    scope: local
  issues:
    scope: local
  pull_requests:
    scope: local
