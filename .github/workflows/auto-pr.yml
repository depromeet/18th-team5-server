name: Auto Create PR

on:
  push:
    branches-ignore:
      - main
      - master

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if PR exists
        id: check
        run: |
          PR_EXISTS=$(gh pr list --head "${{ github.ref_name }}" --json number --jq 'length')
          echo "exists=$PR_EXISTS" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR
        if: steps.check.outputs.exists == '0'
        run: |
          # 브랜치명에서 PR 제목 생성
          BRANCH_NAME="${{ github.ref_name }}"

          # 브랜치 타입 추출 (feature, fix, chore 등)
          PR_TITLE="$BRANCH_NAME"

          # 최근 커밋 메시지들 가져오기
          COMMITS=$(git log origin/main..HEAD --pretty=format:"- %s" 2>/dev/null || echo "- Initial commit")

          gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "$PR_TITLE" \
            --body "## Summary

          이 PR은 \`$BRANCH_NAME\` 브랜치 push 시 자동 생성되었습니다.

          ## Commits

          $COMMITS

          ---
          > _Auto-generated by GitHub Actions_"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}