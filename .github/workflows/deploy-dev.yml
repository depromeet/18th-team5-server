name: Deploy to Dev

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Dev Server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USERNAME }}
          key: ${{ secrets.DEV_SSH_KEY }}
          port: 22
          script: |
            cd ~/18th-team5-server

            # 최신 코드 pull
            git pull origin develop

            # Docker 이미지 빌드
            docker build -t peektime-api:dev .

            # 기존 컨테이너 중지 및 삭제
            docker stop peektime-dev || true
            docker rm peektime-dev || true

            # 새 컨테이너 실행
            docker run -d \
              --name peektime-dev \
              --restart unless-stopped \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=dev \
              peektime-api:dev

            # 오래된 이미지 정리
            docker image prune -f
