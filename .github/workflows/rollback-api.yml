name: Rollback PeekTime API

# ============================================
# 수동 실행만 가능 (실수 방지)
# ============================================
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: '롤백할 이미지 태그 (ECR에서 확인)'
        required: true

env:
  AWS_REGION: ap-northeast-2
  APP_DIR: /app/peektime-api

jobs:
  # ============================================
  # 이전 버전으로 롤백
  # ============================================
  rollback:
    name: Rollback to previous version
    runs-on: ubuntu-latest

    steps:
      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # EC2에 SSH 접속해서 롤백 스크립트 실행
      - name: 롤백 실행
        uses: appleboy/ssh-action@v1.0.3
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          envs: ECR_REGISTRY,IMAGE_TAG
          script: |
            echo "⚠️ 롤백 시작: $IMAGE_TAG"

            # ECR 로그인
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin $ECR_REGISTRY

            # 롤백 디렉토리로 이동
            cd ${{ env.APP_DIR }}

            # 환경변수 설정 후 롤백 스크립트 실행
            export ECR_REGISTRY=$ECR_REGISTRY
            ./scripts/rollback.sh $IMAGE_TAG

            echo "✅ 롤백 완료"