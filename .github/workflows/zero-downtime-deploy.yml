name: Deploy to EC2 (Docker Blue-Green)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_USER: ${{ secrets.EC2_USER }}
  EC2_KEY: ${{ secrets.EC2_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ env.EC2_KEY }}
          script: |
            CURRENT=$(cat /var/run/peaktime-current.env 2>/dev/null || echo "blue")
            TARGET=$([ "$CURRENT" = "blue" ] && echo "green" || echo "blue")
            
            echo "🚀 Blue-Green 배포"
            /app/deploy.sh $TARGET
            /app/switch.sh
            echo "✅ 배포 완료"