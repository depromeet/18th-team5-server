<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - PeekTime Admin</title>
    <link rel="stylesheet" href="common.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--gray-50) 100%);
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo h1 {
            color: var(--primary);
            font-size: 28px;
            font-weight: 700;
        }

        .login-logo p {
            color: var(--gray-500);
            font-size: 14px;
            margin-top: 8px;
        }

        .login-form .form-group {
            margin-bottom: 20px;
        }

        .login-form .btn {
            width: 100%;
            justify-content: center;
            padding: 14px;
            font-size: 16px;
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            color: var(--gray-500);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <h1>🌿 peektime admin</h1>
                <p>관리자 계정으로 로그인하세요</p>
            </div>

            <form class="login-form">
                <div class="form-group">
                    <label class="form-label">아이디</label>
                    <input type="text" class="form-input" placeholder="admin@peektime.com">
                </div>

                <div class="form-group">
                    <label class="form-label">비밀번호</label>
                    <input type="password" class="form-input" placeholder="••••••••">
                </div>

                <button type="submit" class="btn btn-primary">
                    로그인
                </button>
            </form>

            <div class="login-footer">
                © 2026 PeekTime. All rights reserved.
            </div>
        </div>
    </div>
</body>
</html>
