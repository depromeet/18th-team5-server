services:
  admin-blue:
    image: 976972138580.dkr.ecr.ap-northeast-2.amazonaws.com/peaktime-admin:${IMAGE_TAG:-latest}
    container_name: peektime-admin-blue
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    env_file:
      - .env
    ports:
      - "9082:8081"
    restart: unless-stopped
    networks:
      - peektime-admin-network

  admin-green:
    image: 976972138580.dkr.ecr.ap-northeast-2.amazonaws.com/peaktime-admin:${IMAGE_TAG:-latest}
    container_name: peektime-admin-green
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    env_file:
      - .env
    ports:
      - "9083:8081"
    restart: unless-stopped
    networks:
      - peektime-admin-network

  nginx:
    image: nginx:alpine
    container_name: peektime-admin-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/upstream.conf:/etc/nginx/conf.d/upstream.conf:ro
    networks:
      - peektime-admin-network
    restart: unless-stopped

networks:
  peektime-admin-network:
    driver: bridge