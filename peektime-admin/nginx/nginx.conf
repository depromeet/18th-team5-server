events {
    worker_connections 1024;
}
http {
    include /etc/nginx/conf.d/upstream.conf;

    server {
        listen 80;
        server_name peaktime-admin.swda.cloud;
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name peaktime-admin.swda.cloud;

        ssl_certificate /etc/letsencrypt/live/peaktime-admin.swda.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/peaktime-admin.swda.cloud/privkey.pem;

        location / {
            proxy_pass http://peektime_admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}