spring:
  application:
    name: peektime-admin
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false
    encoding: UTF-8
  datasource:
    url: jdbc:h2:mem:peektime-admin;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

server:
  port: 8081

admin:
  username: admin
  password: admin123

gemini:
  model: gemini-2.5-flash
  endpoint: https://generativelanguage.googleapis.com/v1beta/models
  # api-key는 프로필별 설정 파일에서 정의