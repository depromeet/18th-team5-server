spring:
  application:
    name: peektime-admin
  datasource:
    url: jdbc:h2:tcp://localhost:9092/~/h2-data/peektime-admin
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

server:
  port: 8081

gemini:
  api-key: ${GEMINI_API_KEY}
  model: gemini-2.0-flash-lite
  endpoint: https://generativelanguage.googleapis.com/v1beta/models