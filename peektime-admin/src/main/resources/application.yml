spring:
  application:
    name: peektime-admin
  datasource:
    url: jdbc:h2:tcp://localhost:9092/./peektime-admin
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

server:
  port: 8081