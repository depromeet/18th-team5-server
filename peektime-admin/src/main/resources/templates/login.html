<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/blank}">
<head>
    <title>로그인</title>
    <th:block layout:fragment="styles">
        <style>
            body {
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                background: linear-gradient(135deg, var(--primary-light) 0%, var(--gray-50) 100%);
            }

            .login-container {
                width: 100%;
                max-width: 400px;
                padding: 20px;
            }

            .login-card {
                background: white;
                border-radius: 16px;
                padding: 40px;
                box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            }

            .login-logo {
                text-align: center;
                margin-bottom: 32px;
            }

            .login-logo h1 {
                color: var(--primary);
                font-size: 28px;
                font-weight: 700;
            }

            .login-logo p {
                color: var(--gray-500);
                font-size: 14px;
                margin-top: 8px;
            }

            .login-form .form-group {
                margin-bottom: 20px;
            }

            .login-form .btn {
                width: 100%;
                justify-content: center;
                padding: 14px;
                font-size: 16px;
            }

            .login-footer {
                text-align: center;
                margin-top: 24px;
                color: var(--gray-500);
                font-size: 13px;
            }

            .error-message {
                background: #FEE2E2;
                color: #DC2626;
                padding: 12px;
                border-radius: 8px;
                margin-bottom: 20px;
                font-size: 14px;
                text-align: center;
            }
        </style>
    </th:block>
</head>
<body>
    <th:block layout:fragment="content">
        <div class="login-container">
            <div class="login-card">
                <div class="login-logo">
                    <h1>PeakTime Admin</h1>
                    <p>관리자 계정으로 로그인하세요</p>
                </div>

                <div th:if="${param.error}" class="error-message">
                    아이디 또는 비밀번호가 올바르지 않습니다.
                </div>

                <div th:if="${param.logout}" class="error-message" style="background: #D1FAE5; color: #059669;">
                    로그아웃 되었습니다.
                </div>

                <form class="login-form" th:action="@{/login}" method="post">
                    <div class="form-group">
                        <label class="form-label">아이디</label>
                        <input type="text" name="username" class="form-input" placeholder="admin">
                    </div>

                    <div class="form-group">
                        <label class="form-label">비밀번호</label>
                        <input type="password" name="password" class="form-input" placeholder="••••••••">
                    </div>

                    <button type="submit" class="btn btn-primary">
                        로그인
                    </button>
                </form>

                <div class="login-footer">
                    © 2026 PeakTime. All rights reserved.
                </div>
            </div>
        </div>
    </th:block>
</body>
</html>
