services:
  api-blue:
    image: ${ECR_REGISTRY}/peektime/api:${IMAGE_TAG:-latest}
    container_name: peektime-api-blue
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    env_file:
      - .env
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - peektime-network

  api-green:
    image: ${ECR_REGISTRY}/peektime/api:${IMAGE_TAG:-latest}
    container_name: peektime-api-green
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    env_file:
      - .env
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - peektime-network

  nginx:
    image: nginx:alpine
    container_name: peektime-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/upstream.conf:/etc/nginx/conf.d/upstream.conf:ro
    networks:
      - peektime-network
    restart: unless-stopped

networks:
  peektime-network:
    driver: bridge