services:
  mysql:
    image: mysql:8.0
    container_name: peektime-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - peektime-network
    restart: always

  redis:
    image: redis:7
    container_name: peektime-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 20
    networks:
      - peektime-network
    restart: always

  api-blue:
    image: ${ECR_REGISTRY}/peaktime:${IMAGE_TAG:-latest}
    container_name: peektime-api-blue
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    env_file:
      - .env
    ports:
      - "8081:8080"
    restart: unless-stopped
    networks:
      - peektime-network
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy

  api-green:
    image: ${ECR_REGISTRY}/peaktime:${IMAGE_TAG:-latest}
    container_name: peektime-api-green
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    env_file:
      - .env
    ports:
      - "8082:8080"
    restart: unless-stopped
    networks:
      - peektime-network
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: peektime-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/upstream.conf:/etc/nginx/conf.d/upstream.conf:ro
      - /var/www/certbot:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt
    networks:
      - peektime-network
    restart: unless-stopped

networks:
  peektime-network:
    driver: bridge