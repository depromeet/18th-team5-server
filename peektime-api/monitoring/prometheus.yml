global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'peektime-api-blue'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['peektime-api-blue:8080']

  - job_name: 'peektime-api-green'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['peektime-api-green:8080']