events {
    worker_connections 1024;
}
http {
    include /etc/nginx/conf.d/upstream.conf;
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    server {
        listen 80;
        server_name peaktime.swda.cloud;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name peaktime.swda.cloud;

        ssl_certificate /etc/letsencrypt/live/peaktime.swda.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/peaktime.swda.cloud/privkey.pem;

        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
        location / {
            proxy_pass http://peektime_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }
    }
}