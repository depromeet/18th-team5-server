spring:
  application:
    name: peaktime-api
  profiles:
    active: local
  jpa:
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

logging:
  level:
    org.springframework.web: INFO
    com.team.peektime_api: INFO

jwt:
  secret: ${JWT_SECRET}
  access-expiration: ${JWT_ACCESS_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:2592000000}

admin:
  base-url: ${ADMIN_BASE_URL:http://localhost:8081}

cloud:
  aws:
    s3:
      bucket: peaktime-932316879839-ap-northeast-2-an
    cloudfront:
      base-url: ${CLOUDFRONT_BASE_URL:https://d5visb3gnqmrn.cloudfront.net}
    region: ap-northeast-2

firebase:
  credentials-path: classpath:firebase/firebase-service-account.json

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: when_authorized
  prometheus:
    metrics:
      export:
        enabled: true
